<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | 3D Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <style>
        :root { --acc: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .input-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #333; margin-bottom: 50px; }
        input, textarea { width: 80%; padding: 15px; margin: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; }
        
        /* 3D CARD STYLE */
        .portfolio-3d-card {
            background: #fff; color: #000; padding: 60px; border-radius: 30px;
            display: none; margin: auto; max-width: 900px;
            transform-style: preserve-3d; box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            text-align: left;
        }
        .profile-img { width: 200px; height: 200px; border-radius: 20px; border: 5px solid var(--acc); transform: translateZ(50px); }
        .detail-block { margin: 30px 0; transform: translateZ(30px); }
        .line { height: 6px; width: 80px; background: var(--acc); margin: 10px 0; }
        .btn-build { padding: 20px 40px; background: var(--acc); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="input-box">
        <h1>🛠️ 3D PORTFOLIO CREATOR</h1>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="role" placeholder="Role">
        <textarea id="projects" placeholder="Project Details"></textarea>
        <input type="file" id="photo" accept="image/*" onchange="preview(event)">
        <br>
        <button class="btn-build" onclick="build()">GENERATE 3D EXPERIENCE ⚡</button>
    </div>

    <div id="portfolio" class="portfolio-3d-card" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.5">
        <div style="display: flex; align-items: center; gap: 30px;">
            <img id="vPhoto" class="profile-img">
            <div>
                <h1 id="vName" style="font-size: 50px; margin:0;"></h1>
                <p id="vRole" style="font-size: 24px; color: #666;"></p>
            </div>
        </div>
        <div class="detail-block">
            <h2>EXPERIENCE & PROJECTS</h2>
            <div class="line"></div>
            <p id="vProjects" style="font-size: 22px; line-height: 1.6;"></p>
        </div>
        <button onclick="window.print()" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; cursor:pointer;">SAVE 3D PDF</button>
    </div>

    <script>
        let imgData = "";
        function preview(e) { const r = new FileReader(); r.onload = () => imgData = r.result; r.readAsDataURL(e.target.files[0]); }
        function build() {
            document.getElementById('vName').innerText = document.getElementById('name').value;
            document.getElementById('vRole').innerText = document.getElementById('role').value;
            document.getElementById('vProjects').innerText = document.getElementById('projects').value;
            if(imgData) document.getElementById('vPhoto').src = imgData;
            document.getElementById('portfolio').style.display = 'block';
            VanillaTilt.init(document.querySelector(".portfolio-3d-card"));
        }
    </script>
</body>
</html>
