<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | 3D Boy Scene</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
        
        /* THE 3D SCENE (Spline) - This is the Boy with Computer */
        spline-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Floating Info Panels */
        .overlay { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        
        .glass-card { 
            position: absolute; top: 50%; right: 5%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; 
            padding: 35px; width: 350px; pointer-events: auto; color: white;
            box-shadow: 0 0 50px rgba(0,210,255,0.2);
            display: none; /* Hidden until generated */
        }

        .input-panel {
            position: absolute; top: 20px; left: 20px; z-index: 20;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #333;
            padding: 20px; border-radius: 15px; width: 300px; pointer-events: auto;
        }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #00d2ff; color: #000; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; }
        
        h1 { font-size: 35px; margin: 0; color: #00d2ff; text-transform: uppercase; }
        .skills-tag { display: inline-block; background: rgba(0,210,255,0.2); padding: 5px 12px; border-radius: 5px; margin: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.28/build/spline-viewer.js"></script>
    <spline-viewer url="https://prod.spline.design/6Wq1Q7YAnWfEL7uH/scene.splinecode"></spline-viewer>

    <div class="overlay">
        <div class="input-panel" id="setup">
            <h3 style="color:#00d2ff; margin:0 0 10px 0;">3D SCENE SETUP</h3>
            <input type="text" id="pName" placeholder="Enter Your Name">
            <input type="text" id="pRole" placeholder="Role (e.g. Developer)">
            <textarea id="pSkills" placeholder="Skills (comma separated)"></textarea>
            <button class="btn" onclick="activate()">START 3D WORLD 🚀</button>
        </div>

        <div class="glass-card" id="result">
            <h1 id="vName"></h1>
            <p id="vRole" style="opacity:0.8; font-size:18px;"></p>
            <hr style="border:0.5px solid #444; margin:20px 0;">
            <div id="vSkills"></div>
            <p style="font-size:11px; color:#00d2ff; margin-top:30px;">[ SYSTEM ENCRYPTED: ALETI PRANAV ]</p>
        </div>
    </div>

    <script>
        function activate() {
            const name = document.getElementById('pName').value;
            const role = document.getElementById('pRole').value;
            const skills = document.getElementById('pSkills').value;

            if(name && role) {
                document.getElementById('vName').innerText = name;
                document.getElementById('vRole').innerText = role;
                
                const skillBox = document.getElementById('vSkills');
                skillBox.innerHTML = "";
                skills.split(',').forEach(s => {
                    if(s.trim()){
                        const span = document.createElement('span');
                        span.className = 'skills-tag';
                        span.innerText = s.trim().toUpperCase();
                        skillBox.appendChild(span);
                    }
                });

                document.getElementById('setup').style.display = 'none';
                document.getElementById('result').style.display = 'block';
            } else {
                alert("Please fill the details!");
            }
        }
    </script>
</body>
</html>
