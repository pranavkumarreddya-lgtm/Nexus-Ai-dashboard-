<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | 3D Interactive World</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Poppins', sans-serif; }
        
        /* 3D Scene Loader */
        spline-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Floating UI Elements */
        .overlay { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: space-between; padding: 50px; box-sizing: border-box; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            padding: 30px; width: 320px; pointer-events: auto; color: white;
            animation: float 4s infinite alternate;
        }

        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        .input-box { background: #000; border: 1px solid #333; color: #fff; width: 100%; padding: 12px; border-radius: 8px; margin: 10px 0; }
        .btn-glow { width: 100%; padding: 15px; background: #00d2ff; color: #000; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 0 20px #00d2ff; }
        
        /* Final Display Screens */
        #display-info { display: none; position: absolute; top: 50%; right: 10%; z-index: 15; width: 400px; }
    </style>
</head>
<body>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.28/build/spline-viewer.js"></script>
    <spline-viewer url="https://prod.spline.design/6Wq1Q7YAnWfEL7uH/scene.splinecode"></spline-viewer>

    <div class="overlay">
        <div class="glass-panel" id="input-ui">
            <h2 style="color: #00d2ff; margin-top: 0;">3D AVATAR ENGINE</h2>
            <input type="text" id="pName" class="input-box" placeholder="Your Name">
            <input type="text" id="pRole" class="input-box" placeholder="Your Role">
            <textarea id="pSkills" class="input-box" rows="3" placeholder="Skills (e.g. Python, AI)"></textarea>
            <button class="btn-glow" onclick="showPortfolio()">INITIALIZE 3D WORLD 🚀</button>
        </div>

        <div class="glass-panel" id="display-info">
            <h1 id="vName" style="font-size: 40px; margin: 0; color: #00d2ff;"></h1>
            <p id="vRole" style="font-size: 20px; opacity: 0.8;"></p>
            <div style="height: 2px; background: #00d2ff; margin: 20px 0;"></div>
            <p id="vSkills" style="font-size: 18px; line-height: 1.5;"></p>
            <p style="font-size: 12px; color: #00d2ff; margin-top: 30px;">[ SYSTEM ACTIVE: 3D INTERFACE ]</p>
        </div>
    </div>

    <script>
        function showPortfolio() {
            const name = document.getElementById('pName').value;
            const role = document.getElementById('pRole').value;
            const skills = document.getElementById('pSkills').value;

            if(name && role) {
                document.getElementById('vName').innerText = name.toUpperCase();
                document.getElementById('vRole').innerText = role;
                document.getElementById('vSkills').innerText = "CORE MASTERY: " + skills;
                
                document.getElementById('input-ui').style.display = 'none';
                document.getElementById('display-info').style.display = 'block';
            } else {
                alert("Please identify yourself!");
            }
        }
    </script>
</body>
</html>
