<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | 3D Masterpiece</title>
    <style>
        :root { --acc: #00d2ff; --bg: #030303; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* 3D Canvas Background */
        #c { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* UI Overlay */
        .container { position: relative; z-index: 10; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .input-panel { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); 
            padding: 30px; border-radius: 20px; border: 1px solid #222; width: 400px;
        }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--acc); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Floating 3D Portfolio Card */
        #portfolio-3d-card {
            width: 800px; height: 500px; background: #fff; color: #000; 
            border-radius: 30px; padding: 50px; display: none;
            box-shadow: 0 50px 100px rgba(0,210,255,0.3);
            transform-style: preserve-3d;
        }
        .header { display: flex; gap: 30px; align-items: center; border-bottom: 5px solid var(--acc); padding-bottom: 20px; margin-bottom: 30px; }
        .p-img { width: 180px; height: 180px; border-radius: 20px; border: 5px solid var(--acc); object-fit: cover; }
        .content-box { font-size: 22px; line-height: 1.5; }
        h1 { font-size: 45px; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div class="container">
        <div class="input-panel" id="setup">
            <h2 style="color:var(--acc); margin-top:0;">3D ENGINE v2.0</h2>
            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="role" placeholder="Role">
            <textarea id="projects" placeholder="Project Highlights..."></textarea>
            <input type="file" id="photo" accept="image/*" onchange="loadImg(event)">
            <button class="btn" onclick="generate3D()">ACTIVATE 3D SPACE 🚀</button>
        </div>

        <div id="portfolio-3d-card">
            <div class="header">
                <img id="vImg" class="p-img">
                <div>
                    <h1 id="vName"></h1>
                    <p id="vRole" style="font-size:24px; color:#444; margin:5px 0;"></p>
                </div>
            </div>
            <div class="content-box">
                <div style="font-weight:900; color:var(--acc); font-size:26px;">PROJECT SHOWCASE</div>
                <p id="vProj"></p>
            </div>
            <button onclick="window.print()" style="margin-top:20px; padding:10px; width:100%; cursor:pointer;">SAVE PDF</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <script>
        // 3D Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#c'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Floating 3D Cubes
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<20; i++) {
            const material = new THREE.MeshPhongMaterial({ color: 0x00d2ff, wireframe: true });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);
            cube.rotation.set(Math.random(), Math.random(), Math.random());
            scene.add(cube);
            
            function rot() {
                requestAnimationFrame(rot);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
            }
            rot();
        }

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        camera.position.z = 8;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Image & Portfolio Logic
        let imgData = "";
        function loadImg(e) { const r = new FileReader(); r.onload = () => imgData = r.result; r.readAsDataURL(e.target.files[0]); }

        function generate3D() {
            document.getElementById('vName').innerText = document.getElementById('name').value;
            document.getElementById('vRole').innerText = document.getElementById('role').value;
            document.getElementById('vProj').innerText = document.getElementById('projects').value;
            if(imgData) document.getElementById('vImg').src = imgData;

            document.getElementById('setup').style.display = 'none';
            const card = document.getElementById('portfolio-3d-card');
            card.style.display = 'block';

            // Apply 3D Tilt with Glare
            VanillaTilt.init(card, { max: 15, speed: 400, glare: true, "max-glare": 0.4 });
        }
    </script>
</body>
</html>
