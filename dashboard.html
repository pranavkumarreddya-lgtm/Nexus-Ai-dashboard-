<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | 3D Space</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* The 3D Character Scene (Using Iframe for Stability) */
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }

        .overlay { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        
        .setup-panel {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85);
            padding: 25px; border-radius: 15px; border: 1px solid #00d2ff; width: 300px; pointer-events: auto;
        }

        .result-card {
            position: absolute; bottom: 50px; right: 50px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; color: white;
            border: 1px solid rgba(255,255,255,0.1); width: 350px; display: none; pointer-events: auto;
        }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #00d2ff; color: #000; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <iframe src="https://my.spline.design/6Wq1Q7YAnWfEL7uH/"></iframe>

    <div class="overlay">
        <div class="setup-panel" id="setup">
            <h2 style="color:#00d2ff; margin:0;">3D ENGINE</h2>
            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="role" placeholder="Your Role">
            <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
            <button class="btn" onclick="activate()">ACTIVATE 3D WORLD ⚡</button>
        </div>

        <div class="result-card" id="card">
            <h1 id="vName" style="color:#00d2ff; font-size:40px; margin:0;"></h1>
            <p id="vRole" style="font-size:20px; opacity:0.8;"></p>
            <p id="vSkills" style="margin-top:20px; line-height:1.6;"></p>
        </div>
    </div>

    <script>
        function activate() {
            document.getElementById('vName').innerText = document.getElementById('name').value.toUpperCase();
            document.getElementById('vRole').innerText = document.getElementById('role').value;
            document.getElementById('vSkills').innerText = "MASTERY: " + document.getElementById('skills').value;
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('card').style.display = 'block';
        }
    </script>
</body>
</html>
